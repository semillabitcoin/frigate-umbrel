version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: 4rkad-frigate_web_1
      APP_PORT: 8080

  web:
    image: ghcr.io/4rkad/frigate-umbrel-web:1.4.1-3@sha256:aac034dc36c6ff2cc9d1a852adfd308d5ac9409b5efcab605f9925cab44e8e87
    restart: on-failure
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - ${APP_DATA_DIR}/icon.png:/usr/share/nginx/html/icon.png:ro
      - ${APP_DATA_DIR}/data/frigate.log:/usr/share/nginx/html/frigate.log:ro
    environment:
      FRIGATE_TOR_ADDRESS: "${APP_FRIGATE_RPC_HIDDEN_SERVICE}"
      FRIGATE_VERSION: "${APP_VERSION}"
    command: ["sh", "-c", "envsubst '$$FRIGATE_TOR_ADDRESS $$FRIGATE_VERSION' < /tmp/index.template.html > /usr/share/nginx/html/index.html && exec nginx -g 'daemon off;'"]

  init:
    image: alpine:3.20
    user: "0:0"
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command: ["sh", "-c", "mkdir -p /data && touch /data/frigate.log && chmod 644 /data/frigate.log && chown -R 1000:1000 /data && chmod 755 /data && chmod 644 /data/frigate.log"]

  server:
    image: ghcr.io/4rkad/frigate-umbrel:1.4.1-3@sha256:a432c94a1d777569394e03ab97dcc19795fc0dd37b83c7b058a9d9320e67de3f
    user: "0:0"
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "57001:57001"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_BITCOIN_DATA_DIR}:/data/.bitcoin:ro
    environment:
      APP_BITCOIN_NODE_IP: ${APP_BITCOIN_NODE_IP}
      APP_BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      FRIGATE_BITCOIN_DATA_DIR: "/data/.bitcoin"
      FRIGATE_BACKEND_ELECTRUM: "tcp://${APP_ELECTRS_NODE_IP}:${APP_ELECTRS_NODE_PORT}"
      FRIGATE_NETWORK: ${APP_BITCOIN_NETWORK:-mainnet}
      FRIGATE_COMPUTE_BACKEND: "CPU"
      FRIGATE_PORT: "57001"

  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /data/app-4rkad-frigate/main && chmod 700 /data/app-4rkad-frigate/main && printf 'HiddenServiceDir /data/app-4rkad-frigate/main\\nHiddenServicePort 57001 4rkad-frigate_server_1:57001\\n' > /tmp/torrc && exec tor -f /tmp/torrc"]
